repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: validate-pine
        name: Pine Script Validator
        entry: bash scripts/validate-pine.sh
        language: system
        files: '\.pine$'
        pass_filenames: false
